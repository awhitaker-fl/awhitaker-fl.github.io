---
layout: default
---
<article class="egg">
  <header class="egg__header">
    <p class="egg__map">{{ page.map }}</p>
    <h1 class="egg__title">{{ page.title }}</h1>
    {%- if page.summary -%}
      <p class="egg__summary">{{ page.summary }}</p>
    {%- endif -%}
  </header>

  <div class="egg__content">
    {{ content }}
  </div>

  <p class="egg__back"><a href="{{ '/main-quests/' | relative_url }}">&larr; Back to all main quests</a></p>
</article>
